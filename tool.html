<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptAI Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  min-height: 100%;
  background: radial-gradient(circle at top left, #1e293b, #0f172a 60%);
  background-attachment: fixed;
}

html { scroll-behavior: smooth; }

@keyframes floaty {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-18px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fadeIn {
  animation: fadeIn 0.4s ease-out;
}

.blur-blob {
  filter: blur(80px);
  opacity: 0.4;
  animation: floaty 12s ease-in-out infinite;
  box-shadow: 0 0 120px rgba(99,102,241,0.4);
}
</style>
</head>

<body class="min-h-screen text-white">

<!-- BACKGROUND -->
<div class="fixed inset-0 -z-10 overflow-hidden">
  <div class="blur-blob absolute top-10 left-10 w-72 h-72 bg-blue-500 rounded-full"></div>
  <div class="blur-blob absolute bottom-10 right-10 w-80 h-80 bg-purple-600 rounded-full" style="animation-delay:2s;"></div>
</div>

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full backdrop-blur-md bg-slate-900/60 border-b border-slate-800 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
      PromptAI
    </a>
    <div class="text-xs text-gray-400 tracking-wide">
      Intelligent Prompt Engine
    </div>
  </div>
</nav>

<div class="flex pt-20">

<!-- SIDEBAR -->
<aside class="hidden md:block w-64 border-r border-white/10 bg-white/5 backdrop-blur-xl min-h-screen p-6 shadow-2xl">
  <h2 class="text-sm uppercase tracking-wider text-gray-400 mb-4">Chats</h2>
  <div id="chatList" class="space-y-3 text-sm"></div>
</aside>

<!-- MAIN -->
<section class="flex-1 max-w-5xl mx-auto px-8 py-24 space-y-8">

<h3 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
Generate Optimized Prompt
</h3>

<select id="aiSelector" class="w-full p-3 rounded-lg bg-slate-800 border border-gray-600">
<option value="GPT">GPT</option>
<option value="Claude">Claude</option>
<option value="Midjourney">Midjourney</option>
<option value="Stable Diffusion">Stable Diffusion</option>
</select>

<textarea id="promptInput"
class="w-full h-36 p-6 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition"
placeholder="Describe what you want to generate..."></textarea>

<label class="flex items-center gap-3 text-sm text-gray-300">
<input type="checkbox" id="advancedMode" class="accent-purple-500 w-4 h-4">
Enable Advanced Prompt Intelligence
</label>

<button id="generateBtn"
class="bg-gradient-to-r from-blue-500 to-purple-600 py-3 px-8 rounded-xl shadow-lg hover:scale-105 hover:shadow-purple-500/30 transition-all duration-300">
Generate Prompt
</button>

<div id="resultBox" class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl hidden animate-fadeIn">
<h3 class="text-xl font-bold mb-4">Result</h3>
<div id="resultContent" class="text-gray-300 mb-4"></div>

<button id="variationBtn"
class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded-lg text-sm transition hidden">
Generate Variations
</button>

<div id="variationBox" class="mt-6 space-y-4 hidden"></div>

</div>

</section>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const input = document.getElementById("promptInput");
const aiSelect = document.getElementById("aiSelector");
const advancedToggle = document.getElementById("advancedMode");
const button = document.getElementById("generateBtn");
const resultBox = document.getElementById("resultBox");
const resultContent = document.getElementById("resultContent");
const variationBtn = document.getElementById("variationBtn");
const variationBox = document.getElementById("variationBox");
const chatList = document.getElementById("chatList");

let lastInput = "";
let lastAI = "";
let lastCategory = "";

/* SAFE MEMORY LOAD */
let chatHistory = [];
try {
  const stored = localStorage.getItem("promptAIChats");
  chatHistory = stored ? JSON.parse(stored) : [];
} catch (err) {
  chatHistory = [];
}

const saveChats = () => {
  try {
    localStorage.setItem("promptAIChats", JSON.stringify(chatHistory));
  } catch (err) {}
  renderSidebar();
};

/* SIDEBAR RENDER */
const renderSidebar = () => {
  chatList.innerHTML = "";
  const sorted = [...chatHistory].sort((a,b) => (b.pinned||0)-(a.pinned||0));

  sorted.forEach((chat) => {
    const wrapper = document.createElement("div");
    wrapper.className = "flex items-center justify-between p-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all duration-200";

    const title = document.createElement("span");
    title.className = "cursor-pointer text-sm";
    title.innerText = chat.pinned ? "📌 " + chat.title : chat.title;

    title.onclick = () => {
      resultBox.classList.remove("hidden");
      resultContent.innerHTML = chat.content;
    };

    const actions = document.createElement("div");
    actions.className = "flex gap-2 text-xs";

    const pinBtn = document.createElement("button");
    pinBtn.innerText = "📌";
    pinBtn.onclick = (e) => {
      e.stopPropagation();
      chat.pinned = !chat.pinned;
      saveChats();
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "🗑";
    deleteBtn.onclick = (e) => {
      e.stopPropagation();
      chatHistory = chatHistory.filter(c => c !== chat);
      saveChats();
    };

    actions.appendChild(pinBtn);
    actions.appendChild(deleteBtn);

    wrapper.appendChild(title);
    wrapper.appendChild(actions);
    chatList.appendChild(wrapper);
  });
};

renderSidebar();

/* CATEGORY */
const detectCategory = (text) => {
const t = text.toLowerCase();
if (t.match(/website|landing|dashboard|saas|ui|ux/)) return "Website";
if (t.match(/logo|brand|identity|icon/)) return "Logo";
if (t.match(/code|api|script|bug|javascript|python/)) return "Code";
if (t.match(/city|future|futuristic|night|cinematic|fantasy|realistic/)) return "Image";
return "Writing";
};

/* ENHANCER */
const enhancePrompt = (text, category) => {
if (category === "Image")
return `${text}, cinematic lighting, ultra detailed, depth of field, 8k`;
if (category === "Website")
return `${text}\nConversion focused layout, strong CTA, responsive`;
if (category === "Code")
return `${text}\nClean architecture, scalable, well documented`;
return `${text}\nMake it detailed and structured`;
};

/* SCORE */
const evaluatePrompt = (text) => {
let score = 0;
const wordCount = text.split(/\s+/).length;
if (wordCount > 20) score += 2;
if (text.match(/cinematic|lighting|ultra|detailed|professional|8k/i)) score += 2;
if (text.match(/architecture|structure|scalable|responsive/i)) score += 2;
if (text.match(/role|task|deliver|objective/i)) score += 2;
if (text.match(/clear|specific|focused|conversion/i)) score += 2;

let clarity = wordCount > 25 ? "High" : "Medium";
let detail = score >= 6 ? "Strong" : "Basic";
let tip = score >= 8 ? "Excellent prompt structure."
: score <= 4 ? "Add more detail and constraints."
: "Consider refining structure.";

return { score, clarity, detail, tip };
};

/* BUILDER */
const buildPrompt = (text, ai, category) => {
if (ai === "Midjourney")
return `${text}, cinematic lighting, ultra detailed, 4k`;
if (ai === "Stable Diffusion")
return `Positive: ${text}\nNegative: blurry, low quality`;
if (ai === "Claude")
return `Structured reasoning for:\n${text}`;
if (category === "Image")
return `ROLE: Visual Designer\nSCENE:\n${text}`;
if (category === "Code")
return `ROLE: Senior Engineer\nTASK:\n${text}`;
return `ROLE: Creative Expert\nCONTEXT:\n${text}`;
};

/* VARIATIONS */
const buildVariations = (text, ai, category) => {
if (ai === "Midjourney") {
return [
`${text}, cyberpunk neon reflections, rain soaked streets`,
`${text}, minimalist architectural render, soft ambient light`
];
}
if (category === "Image") {
return [
`${text}, dramatic sunset lighting, cinematic color grading`,
`${text}, ultra realistic render, volumetric lighting`
];
}
return [
`Alternative framing:\n${text}`,
`Expanded professional version:\n${text}\nAdd more depth and clarity.`
];
};

/* GENERATE */
button.addEventListener("click", () => {

const text = input.value.trim();
if (!text) return;

let category = detectCategory(text);
let finalInput = advancedToggle.checked ? enhancePrompt(text, category) : text;

const output = buildPrompt(finalInput, aiSelect.value, category);
const analysis = evaluatePrompt(output);

resultBox.classList.remove("hidden");
variationBtn.classList.remove("hidden");
variationBox.classList.add("hidden");
variationBox.innerHTML = "";

resultContent.innerHTML =
`<h4 class='text-lg font-semibold mb-2'>${category} Prompt</h4>
<div class="mb-4 p-4 rounded-lg bg-slate-900 border border-white/10">
<p class="text-sm font-semibold text-purple-400">
Prompt Quality: ${analysis.score} / 10
</p>
<p class="text-xs text-gray-400 mt-1">
Clarity: ${analysis.clarity} | Detail: ${analysis.detail}
</p>
<p class="text-xs text-gray-500 mt-2">
Tip: ${analysis.tip}
</p>
</div>
<pre class='bg-slate-900 p-4 rounded-lg whitespace-pre-wrap text-sm'>${output}</pre>`;

chatHistory.unshift({
  title: category + " - " + new Date().toLocaleTimeString(),
  content: resultContent.innerHTML,
  pinned: false
});

saveChats();

lastInput = finalInput;
lastAI = aiSelect.value;
lastCategory = category;
});

/* VARIATION */
variationBtn.addEventListener("click", () => {
const vars = buildVariations(lastInput, lastAI, lastCategory);
variationBox.classList.remove("hidden");
variationBox.innerHTML = vars.map((v,i) =>
`<div class='bg-slate-900 p-4 rounded-lg'>
<h5 class='font-semibold mb-2'>Variation ${i+1}</h5>
<pre class='whitespace-pre-wrap text-sm'>${v}</pre>
</div>`
).join("");
});

});
</script>

</body>
</html>
