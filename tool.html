<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptAI Tool</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  min-height: 100%;
  background: radial-gradient(circle at top left,#1e293b,#0f172a 60%);
  background-attachment: fixed;
}
@keyframes floaty {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-18px); }
}
.blur-blob {
  filter: blur(80px);
  opacity: 0.4;
  animation: floaty 12s ease-in-out infinite;
}
</style>
</head>

<body class="min-h-screen text-white">

<div class="fixed inset-0 -z-10 overflow-hidden">
  <div class="blur-blob absolute top-10 left-10 w-72 h-72 bg-blue-500 rounded-full"></div>
  <div class="blur-blob absolute bottom-10 right-10 w-80 h-80 bg-purple-600 rounded-full"></div>
</div>

<nav class="fixed top-0 left-0 w-full backdrop-blur-md bg-slate-900/60 border-b border-slate-800 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
    <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
      PromptAI
    </a>
    <div class="text-xs text-gray-400">Universal Prompt Engine</div>
  </div>
</nav>

<div class="flex pt-20">

<!-- SIDEBAR -->
<aside class="hidden md:block w-64 border-r border-white/10 bg-white/5 backdrop-blur-xl min-h-screen p-6">
  <h2 class="text-sm uppercase text-gray-400 mb-4">Chats</h2>
  <div id="chatList" class="space-y-3 text-sm"></div>
</aside>

<!-- MAIN -->
<section class="flex-1 max-w-5xl mx-auto px-8 py-24 space-y-6">

<h3 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
Generate Optimized Prompt
</h3>

<select id="aiSelector" class="w-full p-3 rounded-lg bg-slate-800 border border-gray-600">
<option value="GPT">GPT</option>
<option value="Claude">Claude</option>
<option value="Midjourney">Midjourney</option>
<option value="Stable Diffusion">Stable Diffusion</option>
</select>

<textarea id="promptInput"
class="w-full h-36 p-6 rounded-2xl bg-white/5 border border-white/10 shadow-xl"
placeholder="Describe what you want to generate..."></textarea>

<input type="file" id="fileInput"
class="w-full p-3 rounded-lg bg-slate-800 border border-gray-600 text-sm" />

<label class="flex items-center gap-3 text-sm text-gray-300">
<input type="checkbox" id="advancedMode" class="accent-purple-500 w-4 h-4">
Enable Advanced Prompt Intelligence
</label>

<button id="generateBtn"
class="bg-gradient-to-r from-blue-500 to-purple-600 py-3 px-8 rounded-xl hover:scale-105 transition">
Generate Prompt
</button>

<!-- RESULT BOX -->
<div id="resultBox" class="bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl hidden">

<h3 class="text-xl font-bold mb-4">Result</h3>

<div id="analysisBox" class="mb-4 hidden"></div>

<div id="resultContent" class="text-gray-300 mb-4"></div>

<div class="flex gap-3 mb-4">
<button id="copyBtn" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm">Copy</button>
<button id="variationBtn" class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded-lg text-sm">
Generate Variations
</button>
</div>

<div id="variationBox" class="mt-6 space-y-4 hidden"></div>

</div>

</section>
</div>

<!-- JS will be added in Step 2 -->
<script>
document.addEventListener("DOMContentLoaded", () => {

const input = document.getElementById("promptInput");
const aiSelect = document.getElementById("aiSelector");
const advancedToggle = document.getElementById("advancedMode");
const button = document.getElementById("generateBtn");

const resultBox = document.getElementById("resultBox");
const resultContent = document.getElementById("resultContent");
const analysisBox = document.getElementById("analysisBox");
const variationBtn = document.getElementById("variationBtn");
const variationBox = document.getElementById("variationBox");

let lastOutput = "";
let lastInput = "";
let lastAI = "";
let lastCategory = "";

/* CATEGORY DETECTION */
const detectCategory = (text) => {
  const t = text.toLowerCase();
  if (t.match(/website|landing|dashboard|saas|ui|ux/)) return "Website";
  if (t.match(/logo|brand|identity|icon/)) return "Branding";
  if (t.match(/code|api|script|bug|javascript|python/)) return "Code";
  if (t.match(/city|future|cinematic|fantasy|realistic|lighting/)) return "Image";
  return "Writing";
};

/* ENHANCER */
const enhancePrompt = (text, category) => {
  if (category === "Image")
    return `${text}, cinematic lighting, ultra detailed, 8k, depth of field`;
  if (category === "Website")
    return `${text}\nConversion focused layout, strong CTA, responsive design`;
  if (category === "Code")
    return `${text}\nClean architecture, scalable structure, documented`;
  return `${text}\nMake it detailed, structured and professional`;
};

/* SCORING */
const evaluatePrompt = (text) => {
  let score = 0;
  const words = text.split(/\s+/).length;

  if (words > 20) score += 2;
  if (text.match(/cinematic|detailed|professional|8k/i)) score += 2;
  if (text.match(/structure|architecture|scalable/i)) score += 2;
  if (text.match(/role|task|objective|deliver/i)) score += 2;
  if (text.match(/clear|focused|specific/i)) score += 2;

  const clarity = words > 25 ? "High" : "Medium";
  const detail = score >= 6 ? "Strong" : "Basic";

  return { score, clarity, detail };
};

/* PROMPT BUILDER */
const buildPrompt = (text, ai, category) => {

  if (ai === "Midjourney")
    return `${text}, cinematic lighting, ultra detailed, 4k`;

  if (ai === "Stable Diffusion")
    return `Positive: ${text}\nNegative: blurry, low quality`;

  if (ai === "Claude")
    return `Structured reasoning for:\n${text}`;

  if (category === "Image")
    return `ROLE: Visual Designer\nSCENE:\n${text}`;

  if (category === "Code")
    return `ROLE: Senior Engineer\nTASK:\n${text}`;

  return `ROLE: Creative Expert\nCONTEXT:\n${text}`;
};

/* VARIATIONS */
const buildVariations = (text, ai, category) => {

  if (ai === "Midjourney") {
    return [
      `${text}, cyberpunk neon reflections`,
      `${text}, minimalist architecture style`
    ];
  }

  if (category === "Image") {
    return [
      `${text}, dramatic sunset lighting`,
      `${text}, ultra realistic volumetric lighting`
    ];
  }

  return [
    `Alternative version:\n${text}`,
    `Expanded professional version:\n${text}\nAdd more depth.`
  ];
};

/* GENERATE BUTTON */
button.addEventListener("click", () => {

  const text = input.value.trim();
  if (!text) return;

  let category = detectCategory(text);
  let finalInput = advancedToggle.checked ? enhancePrompt(text, category) : text;

  const output = buildPrompt(finalInput, aiSelect.value, category);
  const analysis = evaluatePrompt(output);

  resultBox.classList.remove("hidden");
  variationBox.classList.add("hidden");

  analysisBox.classList.remove("hidden");
  analysisBox.innerHTML =
  `<div class="p-4 rounded-lg bg-slate-900 border border-white/10">
  <p class="text-sm font-semibold text-purple-400">
  Prompt Quality: ${analysis.score} / 10
  </p>
  <p class="text-xs text-gray-400 mt-1">
  Clarity: ${analysis.clarity} | Detail: ${analysis.detail}
  </p>
  </div>`;

  resultContent.innerHTML =
  `<pre class='bg-slate-900 p-4 rounded-lg whitespace-pre-wrap text-sm'>${output}</pre>`;

  lastOutput = output;
  lastInput = finalInput;
  lastAI = aiSelect.value;
  lastCategory = category;

});

/* VARIATION BUTTON */
variationBtn.addEventListener("click", () => {

  if (!lastOutput) return;

  const vars = buildVariations(lastInput, lastAI, lastCategory);

  variationBox.classList.remove("hidden");

  variationBox.innerHTML = vars.map((v,i) =>
  `<div class='bg-slate-900 p-4 rounded-lg'>
  <h5 class='font-semibold mb-2'>Variation ${i+1}</h5>
  <pre class='whitespace-pre-wrap text-sm'>${v}</pre>
  </div>`
  ).join("");

});

});
</script>
</body>
</html>
