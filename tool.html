`<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptAI Tool</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  min-height: 100%;
  background: radial-gradient(circle at top left,#1e293b,#0f172a 60%);
  background-attachment: fixed;
}
@keyframes floaty {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-18px); }
}
.blur-blob {
  filter: blur(80px);
  opacity: 0.4;
  animation: floaty 12s ease-in-out infinite;
}
</style>
</head>

<body class="min-h-screen text-white">

<div class="fixed inset-0 -z-10 overflow-hidden">
  <div class="blur-blob absolute top-10 left-10 w-72 h-72 bg-blue-500 rounded-full"></div>
  <div class="blur-blob absolute bottom-10 right-10 w-80 h-80 bg-purple-600 rounded-full"></div>
</div>

<nav class="fixed top-0 left-0 w-full backdrop-blur-md bg-slate-900/60 border-b border-slate-800 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
    <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
      PromptAI
    </a>
    <div class="text-xs text-gray-400">Universal Prompt Engine</div>
  </div>
</nav>

<div class="flex pt-20">

<!-- SIDEBAR -->
<aside class="hidden md:block w-64 border-r border-white/10 bg-white/5 backdrop-blur-xl min-h-screen p-6">
  <h2 class="text-sm uppercase text-gray-400 mb-4">Chats</h2>
  <div id="chatList" class="space-y-3 text-sm"></div>
</aside>

<!-- MAIN -->
<section class="flex-1 max-w-5xl mx-auto px-8 py-24 space-y-6">

<h3 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
Generate Optimized Prompt
</h3>

<select id="aiSelector" class="w-full p-3 rounded-lg bg-slate-800 border border-gray-600">
<option value="GPT">GPT</option>
<option value="Claude">Claude</option>
<option value="Midjourney">Midjourney</option>
<option value="Stable Diffusion">Stable Diffusion</option>
</select>

<textarea id="promptInput"
class="w-full h-36 p-6 rounded-2xl bg-white/5 border border-white/10 shadow-xl"
placeholder="Describe what you want to generate..."></textarea>

<input type="file" id="fileInput"
class="w-full p-3 rounded-lg bg-slate-800 border border-gray-600 text-sm" />

<label class="flex items-center gap-3 text-sm text-gray-300">
<input type="checkbox" id="advancedMode" class="accent-purple-500 w-4 h-4">
Enable Advanced Prompt Intelligence
</label>

<button id="generateBtn"
class="bg-gradient-to-r from-blue-500 to-purple-600 py-3 px-8 rounded-xl hover:scale-105 transition">
Generate Prompt
</button>

<!-- RESULT BOX -->
<div id="resultBox" class="bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl hidden">

<h3 class="text-xl font-bold mb-4">Result</h3>

<div id="analysisBox" class="mb-4 hidden"></div>

<div id="resultContent" class="text-gray-300 mb-4"></div>

<div class="flex gap-3 mb-4">
<button id="copyBtn" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm">Copy</button>
<button id="variationBtn" class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded-lg text-sm">
Generate Variations
</button>
</div>

<div id="variationBox" class="mt-6 space-y-4 hidden"></div>

</div>

</section>
</div>

<!-- JS will be added in Step 2 -->
<script>
document.addEventListener("DOMContentLoaded", () => {

const input = document.getElementById("promptInput");
const aiSelect = document.getElementById("aiSelector");
const advancedToggle = document.getElementById("advancedMode");
const button = document.getElementById("generateBtn");
const resultBox = document.getElementById("resultBox");
const resultContent = document.getElementById("resultContent");
const analysisBox = document.getElementById("analysisBox");
const variationBtn = document.getElementById("variationBtn");
const variationBox = document.getElementById("variationBox");
const copyBtn = document.getElementById("copyBtn");
const chatList = document.getElementById("chatList");

let lastOutput = "";
let lastInput = "";
let lastAI = "";
let lastCategory = "";

/* =========================
   MEMORY SYSTEM
========================= */

let chatHistory = JSON.parse(localStorage.getItem("promptAIChats")) || [];

const saveChats = () => {
  localStorage.setItem("promptAIChats", JSON.stringify(chatHistory));
  renderSidebar();
};

const renderSidebar = () => {
  chatList.innerHTML = "";

  const sorted = [...chatHistory].sort((a,b)=>(b.pinned||0)-(a.pinned||0));

  sorted.forEach((chat,index) => {

    const wrapper = document.createElement("div");
    wrapper.className =
    "flex justify-between items-center p-3 rounded-lg bg-white/5 hover:bg-white/10 transition";

    const title = document.createElement("span");
    title.className = "cursor-pointer text-sm";
    title.innerText = chat.pinned ? "📌 " + chat.title : chat.title;

    title.onclick = () => {
      resultBox.classList.remove("hidden");
      resultContent.innerHTML = chat.content;
      analysisBox.innerHTML = chat.analysis;
      analysisBox.classList.remove("hidden");
      lastOutput = chat.raw;
    };

    const actions = document.createElement("div");
    actions.className = "flex gap-2 text-xs";

    const pinBtn = document.createElement("button");
    pinBtn.innerText = "📌";
    pinBtn.onclick = (e) => {
      e.stopPropagation();
      chat.pinned = !chat.pinned;
      saveChats();
    };

    const delBtn = document.createElement("button");
    delBtn.innerText = "🗑";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      chatHistory = chatHistory.filter(c => c !== chat);
      saveChats();
    };

    actions.appendChild(pinBtn);
    actions.appendChild(delBtn);

    wrapper.appendChild(title);
    wrapper.appendChild(actions);
    chatList.appendChild(wrapper);
  });
};

renderSidebar();

/* =========================
   INTELLIGENCE ENGINE
========================= */

const detectCategory = (text) => {
  const t = text.toLowerCase();
  if (t.match(/website|landing|dashboard|saas|ui|ux/)) return "Website";
  if (t.match(/logo|brand|identity|icon/)) return "Branding";
  if (t.match(/code|api|script|bug|javascript|python/)) return "Code";
  if (t.match(/city|future|cinematic|fantasy|realistic/)) return "Image";
  return "Writing";
};

const enhancePrompt = (text, category) => {
  if (category === "Image")
    return `${text}, cinematic lighting, ultra detailed, 8k`;
  if (category === "Website")
    return `${text}\nConversion focused layout, responsive`;
  if (category === "Code")
    return `${text}\nClean architecture, scalable`;
  return `${text}\nMake it structured and professional`;
};

const evaluatePrompt = (text) => {
  let score = 0;
  const words = text.split(/\s+/).length;

  if (words > 20) score += 2;
  if (text.match(/cinematic|detailed|professional|8k/i)) score += 2;
  if (text.match(/structure|architecture|scalable/i)) score += 2;
  if (text.match(/role|task|objective/i)) score += 2;
  if (text.match(/clear|specific|focused/i)) score += 2;

  const clarity = words > 25 ? "High" : "Medium";
  const detail = score >= 6 ? "Strong" : "Basic";

  return { score, clarity, detail };
};
  const buildPrompt = (text, ai, category) => {

  if (category === "Image") {
    return `
ROLE: Senior Visual Concept Designer

OBJECTIVE:
Create a highly detailed visual based on: ${text}

CHARACTER / ENVIRONMENT DETAILS:
- Appearance, outfit, expression
- Surroundings and environment
- Mood and atmosphere
- Background complexity

LIGHTING:
- Cinematic lighting
- Dramatic shadows
- Depth of field
- Volumetric effects

CAMERA:
- Dynamic framing
- Professional composition
- Wide angle / close-up

RENDER:
- 8K resolution
- Ultra realistic
- High texture detail
- Professional color grading
`;
  }

  if (category === "Website") {
    return `
ROLE: Senior UX Strategist & Web Architect

PROJECT OBJECTIVE:
${text}

DELIVER:

1️⃣ INFORMATION ARCHITECTURE
- Page structure breakdown
- Section hierarchy
- User journey mapping

2️⃣ HERO SECTION
- Clear headline
- Supporting subtext
- Strong CTA

3️⃣ FEATURE BLOCKS
- Feature explanation
- Benefits
- Visual guidance

4️⃣ CONVERSION STRATEGY
- Primary CTA placement
- Secondary CTA
- Trust elements

FORMAT:
Structured headings + actionable implementation notes.
`;
  }

  if (category === "Code") {
    return `
ROLE: Senior Software Engineer

TASK:
${text}

REQUIREMENTS:
- Clean modular architecture
- Scalable structure
- Proper error handling
- Optimized performance

DELIVER:
- Complete working code
- Explanation of logic
- Comments included
- Best practices followed
`;
  }

  if (category === "App") {
    return `
ROLE: Product Architect & Startup Strategist

APP IDEA:
${text}

DELIVER:
1️⃣ Core Concept
2️⃣ Target Audience
3️⃣ Key Features
4️⃣ Monetization Model
5️⃣ Tech Stack Suggestion
6️⃣ Growth Strategy
`;
  }

  if (category === "Study") {
    return `
ROLE: Expert Educator

TOPIC:
${text}

DELIVER:
- Clear explanation
- Step-by-step breakdown
- Real-world examples
- Important concepts
- Summary notes
`;
  }

  if (category === "Business") {
    return `
ROLE: Strategic Business Consultant

OBJECTIVE:
${text}

DELIVER:
- Market positioning
- Revenue model
- Growth plan
- Risk assessment
- Action roadmap
`;
  }

  return `
ROLE: Professional Content Architect

OBJECTIVE:
${text}

DELIVER:
- Structured format
- Clear headings
- Detailed expansion
- Professional tone
`;
};

const buildVariations = (text, ai, category) => {
  if (ai === "Midjourney")
    return [
      `${text}, cyberpunk neon reflections`,
      `${text}, soft cinematic lighting`
    ];

  if (category === "Image")
    return [
      `${text}, dramatic sunset lighting`,
      `${text}, ultra realistic volumetric lighting`
    ];

  return [
    `Alternative version:\n${text}`,
    `Expanded version:\n${text}\nAdd more depth and clarity`
  ];
};

/* =========================
   GENERATE (BACKEND)
========================= */

/* =========================
   GENERATE (FRONTEND ENGINE)
========================= */

button.addEventListener("click", () => {

  const text = input.value.trim();
  if (!text) return;

  let category = detectCategory(text);
  let finalInput = advancedToggle.checked ? enhancePrompt(text, category) : text;

  const output = buildPrompt(finalInput, aiSelect.value, category);

  const analysis = evaluatePrompt(output);

  resultBox.classList.remove("hidden");
  variationBox.classList.add("hidden");

  analysisBox.classList.remove("hidden");
  analysisBox.innerHTML =
  `<div class="p-4 rounded-lg bg-slate-900 border border-white/10">
  <p class="text-sm font-semibold text-purple-400">
  Prompt Quality: ${analysis.score} / 10
  </p>
  <p class="text-xs text-gray-400 mt-1">
  Clarity: ${analysis.clarity} | Detail: ${analysis.detail}
  </p>
  </div>`;

  resultContent.innerHTML =
  `<pre class='bg-slate-900 p-4 rounded-lg whitespace-pre-wrap text-sm'>${output}</pre>`;

  lastOutput = output;
  lastInput = finalInput;
  lastAI = aiSelect.value;
  lastCategory = category;

  chatHistory.unshift({
    title: category + " - " + new Date().toLocaleTimeString(),
    content: resultContent.innerHTML,
    analysis: analysisBox.innerHTML,
    raw: output,
    pinned: false
  });

  saveChats();

});

  const text = input.value.trim();
  if (!text) return;

  let category = detectCategory(text);
  let finalInput = advancedToggle.checked ? enhancePrompt(text, category) : text;

  resultBox.classList.remove("hidden");
  variationBox.classList.add("hidden");
  resultContent.innerHTML = "Processing... 🚀";

  try {

    const response = await fetch("http://localhost:5000/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: finalInput,
        category: category,
        ai: aiSelect.value
      })
    });

    const data = await response.json();
    const output = data.output;

    const analysis = evaluatePrompt(output);

    analysisBox.classList.remove("hidden");
    analysisBox.innerHTML =
    `<div class="p-4 rounded-lg bg-slate-900 border border-white/10">
    <p class="text-sm font-semibold text-purple-400">
    Prompt Quality: ${analysis.score} / 10
    </p>
    <p class="text-xs text-gray-400 mt-1">
    Clarity: ${analysis.clarity} | Detail: ${analysis.detail}
    </p>
    </div>`;

    resultContent.innerHTML =
    `<pre class='bg-slate-900 p-4 rounded-lg whitespace-pre-wrap text-sm'>${output}</pre>`;

    lastOutput = output;
    lastInput = finalInput;
    lastAI = aiSelect.value;
    lastCategory = category;

    chatHistory.unshift({
      title: category + " - " + new Date().toLocaleTimeString(),
      content: resultContent.innerHTML,
      analysis: analysisBox.innerHTML,
      raw: output,
      pinned: false
    });

    saveChats();

  } catch {
    resultContent.innerHTML = "Backend connection failed ❌";
  }

});

/* =========================
   COPY
========================= */

copyBtn.addEventListener("click", () => {
  if (!lastOutput) return;
  navigator.clipboard.writeText(lastOutput);
});

/* =========================
   VARIATIONS
========================= */

variationBtn.addEventListener("click", () => {

  if (!lastOutput) return;

  const vars = buildVariations(lastInput, lastAI, lastCategory);

  variationBox.classList.remove("hidden");

  variationBox.innerHTML = vars.map((v,i)=>
  `<div class='bg-slate-900 p-4 rounded-lg'>
  <h5 class='font-semibold mb-2'>Variation ${i+1}</h5>
  <pre class='whitespace-pre-wrap text-sm'>${v}</pre>
  </div>`
  ).join("");

});

});
</script>
</body>
</html>
