<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        @keyframes floaty {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-18px); }
        }
        .blur-blob {
            filter: blur(70px);
            opacity: 0.6;
            animation: floaty 10s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <nav class="p-6 bg-opacity-60">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">PromptAI</h1>
        </div>
    </nav>
    <header class="relative flex items-center justify-center min-h-screen overflow-hidden">
        <div class="absolute inset-0">
            <div class="blur-blob absolute top-10 left-10 w-72 h-72 bg-blue-500 rounded-full"></div>
            <div class="blur-blob absolute bottom-10 right-10 w-80 h-80 bg-purple-600 rounded-full" style="animation-delay: 2s;"></div>
        </div>
        <div class="relative text-center px-6">
            <h2 class="text-5xl font-extrabold text-center mb-6">Turn Ideas Into Intelligent Prompts.</h2>
            <p class="text-xl mb-8">Deep AI analysis for text and images.</p>
            <a href="#tool" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold py-2 px-6 rounded-lg transition-all duration-300 hover:scale-105">Analyze</a>
        </div>
    </header>
    <main>
        <div class="max-w-5xl mx-auto px-6 py-20 space-y-12">
            <section id="tool" class="space-y-6">
                <h3 class="text-2xl font-bold">Analyze Your Content</h3>
                <textarea id="promptInput" class="w-full h-32 p-6 rounded-2xl border border-gray-300 bg-slate-800 shadow-xl" placeholder="Enter text here..."></textarea>
                <input id="imageInput" type="file" class="w-full p-2 rounded-lg border border-gray-300" accept="image/*" />
                <button id="analyzeButton" class="inline-flex items-center gap-2 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold py-2 px-6 rounded-lg transition-all duration-300 hover:scale-105">
                    <span id="loadingSpinner" class="hidden inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                    Analyze
                </button>
            </section>
            <section id="result" class="bg-slate-800 rounded-2xl p-6 shadow-xl">
                <h3 class="text-xl font-bold">Results:</h3>
                <div id="resultContent" class="mt-4 text-gray-200 space-y-4">
                    <p>Your AI analysis will appear here.</p>
                </div>
            </section>
        </div>
    </main>
    <script>
        const promptInput = document.getElementById('promptInput');
        const imageInput = document.getElementById('imageInput');
        const analyzeButton = document.getElementById('analyzeButton');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultContent = document.getElementById('resultContent');

        analyzeButton.addEventListener('click', () => {
            const promptText = promptInput.value.trim();
            const hasImage = imageInput.files.length > 0;

            loadingSpinner.classList.remove('hidden');
            analyzeButton.setAttribute('disabled', 'true');
            analyzeButton.classList.add('opacity-80', 'cursor-not-allowed');

            resultContent.innerHTML = '<p class="text-gray-400">Analyzing your input...</p>';

            setTimeout(() => {
                const results = [];

                if (promptText) {
                    results.push(`
                        <div class="space-y-2">
                            <h4 class="text-lg font-semibold text-white">Summary</h4>
                            <p class="text-gray-200">Your idea focuses on delivering clear, high-impact prompts with structured guidance.</p>
                        </div>
                        <div class="space-y-2">
                            <h4 class="text-lg font-semibold text-white">Key Points</h4>
                            <ul class="list-disc list-inside text-gray-200 space-y-1">
                                <li>Clear objective and outcome.</li>
                                <li>Concise and user-friendly language.</li>
                                <li>Strong emphasis on AI-driven clarity.</li>
                            </ul>
                        </div>
                        <div class="space-y-2">
                            <h4 class="text-lg font-semibold text-white">Suggestions</h4>
                            <p class="text-gray-200">Add measurable success metrics and include example prompts for onboarding.</p>
                        </div>
                    `);
                }

                if (hasImage) {
                    results.push(`
                        <div class="space-y-2">
                            <h4 class="text-lg font-semibold text-white">Image Analysis</h4>
                            <p class="text-gray-200">Image analysis complete.</p>
                            <p class="text-gray-200">Detected elements: sample object, colors, mood.</p>
                        </div>
                    `);
                }

                if (!promptText && !hasImage) {
                    results.push('<p class="text-gray-200">Please add text or upload an image to analyze.</p>');
                }

                resultContent.innerHTML = results.join('');
                loadingSpinner.classList.add('hidden');
                analyzeButton.removeAttribute('disabled');
                analyzeButton.classList.remove('opacity-80', 'cursor-not-allowed');
            }, 1500);
        });
    </script>
</body>
</html>
