<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptAI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top left, #1e293b, #0f172a 60%);
}
@keyframes fadeIn {
  from { opacity:0; transform: translateY(8px);}
  to { opacity:1; transform: translateY(0);}
}
.fade-in { animation: fadeIn 0.4s ease-out; }

@keyframes successPulse {
  0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.35); }
  70% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
  100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}
.success-pulse { animation: successPulse 0.8s ease-out; }
</style>
</head>

<body class="text-white min-h-screen">

<div class="max-w-4xl mx-auto px-6 py-20 space-y-10">

<h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
PromptAI
</h1>

<select id="aiSelector" class="w-full p-3 rounded-lg bg-slate-800 border border-gray-600">
<option value="GPT">GPT</option>
<option value="Claude">Claude</option>
<option value="Midjourney">Midjourney</option>
<option value="Stable Diffusion">Stable Diffusion</option>
</select>

<textarea id="promptInput"
class="w-full h-32 p-6 rounded-2xl bg-slate-800 border border-gray-600"
placeholder="Describe what you want to generate..."></textarea>

<button id="generateBtn"
class="bg-gradient-to-r from-blue-500 to-purple-600 px-6 py-2 rounded-lg font-semibold">
Generate Prompt
</button>

<div id="resultBox" class="bg-slate-800 p-6 rounded-xl hidden">
<div id="categoryBadge" class="text-xs text-blue-300 mb-2"></div>
<div id="score" class="text-xs text-emerald-400 mb-2"></div>
<pre id="resultContent" class="whitespace-pre-wrap text-sm"></pre>
<button id="copyBtn" class="mt-4 bg-slate-700 px-4 py-2 rounded-lg text-sm">
Copy
</button>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const input = document.getElementById("promptInput");
const aiSelect = document.getElementById("aiSelector");
const generateBtn = document.getElementById("generateBtn");
const resultBox = document.getElementById("resultBox");
const resultContent = document.getElementById("resultContent");
const categoryBadge = document.getElementById("categoryBadge");
const scoreEl = document.getElementById("score");
const copyBtn = document.getElementById("copyBtn");

const detectCategory = (text) => {
  const t = text.toLowerCase();
  if (t.match(/website|landing|dashboard|saas|ui|ux/)) return "Website";
  if (t.match(/logo|brand|identity|icon/)) return "Logo";
  if (t.match(/t-shirt|tshirt|tee|merch/)) return "T-shirt";
  if (t.match(/code|api|script|bug|javascript|python/)) return "Code";
  if (t.match(/marketing|growth|strategy|sales/)) return "Business";
  if (t.match(/image|art|poster|illustration|scene/)) return "Image";
  return "Writing";
};

const generateScore = (text) => {
  let score = 50;
  if (text.length > 40) score += 15;
  if (text.split(" ").length > 8) score += 15;
  if (text.match(/style|modern|minimal|detailed|cinematic|strategy/)) score += 20;
  return Math.min(score, 100);
};

const buildPrompt = (text, ai, category) => {

if (ai === "Midjourney") {
  return `${category} concept: ${text}, ultra detailed, cinematic lighting, 4k, masterpiece`;
}

if (ai === "Stable Diffusion") {
  return `Positive Prompt:
${category} concept: ${text}, high detail, sharp focus

Negative Prompt:
blurry, low quality, distorted`;
}

if (ai === "Claude") {
  return `You are a structured reasoning assistant.

Task:
${text}

Provide:
1. Clear breakdown
2. Strategic insight
3. Structured response
4. Professional tone`;
}

return `Role: Senior ${category} Specialist

Objective:
${text}

Requirements:
- Clear structure
- Practical output
- Professional formatting

Deliver actionable results.`;
};

generateBtn.addEventListener("click", () => {

const text = input.value.trim();
if (!text) return;

const ai = aiSelect.value;
const category = detectCategory(text);
const prompt = buildPrompt(text, ai, category);
const score = generateScore(text);

resultContent.textContent = prompt;
categoryBadge.textContent = "Detected Category: " + category;
scoreEl.textContent = "Prompt Quality Score: " + score + "/100";

resultBox.classList.remove("hidden");
resultBox.classList.add("fade-in", "success-pulse");

setTimeout(() => {
  resultBox.classList.remove("success-pulse");
}, 800);

});

copyBtn.addEventListener("click", () => {
  navigator.clipboard.writeText(resultContent.textContent);
});

});
</script>

</body>
</html>

</body>
</html>
